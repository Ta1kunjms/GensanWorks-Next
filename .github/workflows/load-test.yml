name: Load Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "scripts/load-smoke.js"
      - ".github/workflows/load-test.yml"

jobs:
  load-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in time"
          tail -n 200 /tmp/next-dev.log || true
          exit 1

      - name: Run load smoke test
        env:
          LOAD_BASE_URL: http://localhost:3000
          LOAD_TOTAL_REQUESTS: 60
          LOAD_CONCURRENCY: 6
          LOAD_ALLOW_DEGRADED: 1
        run: npm run test:load:smoke

      - name: Upload load smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-smoke-artifacts
          path: |
            reports/load/load-smoke-report.json
            /tmp/next-dev.log
          retention-days: 14

      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/next-dev.pid ]; then
            kill "$(cat /tmp/next-dev.pid)" || true
          fi

      - name: Print server log on failure
        if: failure()
        run: tail -n 200 /tmp/next-dev.log || true
