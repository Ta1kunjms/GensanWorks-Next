name: Backup Restore Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  backup-restore-drill:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backup/restore drill
        run: npm run ops:backup:drill

      - name: Upload backup drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-restore-drill
          path: exports/backup-drills/*.json
          retention-days: 14
