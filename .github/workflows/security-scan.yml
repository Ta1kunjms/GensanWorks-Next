name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        if: ${{ secrets.DATABASE_URL != '' && secrets.NEXTAUTH_SECRET != '' && secrets.AUTH_SECRET != '' && secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        env:
          VALIDATE_ENV_STRICT: 1
        run: npm run validate:env

      - name: Secret leak scan
        run: npm run security:secrets:scan

      - name: NPM audit (high and critical)
        run: npm audit --audit-level=high

  phase8-security-smoke:
    runs-on: ubuntu-latest
    needs: dependency-audit
    if: ${{ secrets.DATABASE_URL != '' }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in time"
          tail -n 200 /tmp/next-dev.log || true
          exit 1

      - name: Run Phase 8 security smoke tests
        env:
          PHASE8_BASE_URL: http://localhost:3000
        run: npm run test:security

      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/next-dev.pid ]; then
            kill "$(cat /tmp/next-dev.pid)" || true
          fi

      - name: Print server log on failure
        if: failure()
        run: tail -n 200 /tmp/next-dev.log || true
